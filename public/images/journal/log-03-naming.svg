<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" role="img" aria-label="Cyberpunk terminal generating and selecting a brand name">
  <defs>
    <linearGradient id="g3bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#121212"></stop>
      <stop offset="100%" stop-color="#070707"></stop>
    </linearGradient>
    <filter id="g3glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <pattern id="g3grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="#181818" stroke-width="1"></path>
    </pattern>
    <pattern id="g3scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#000000" opacity="0.32"></rect>
    </pattern>
  </defs>

  <rect width="800" height="420" fill="url(#g3bg)"></rect>
  <rect width="800" height="420" fill="url(#g3grid)"></rect>

  
  <rect x="40" y="34" width="720" height="26" fill="#0E0E0E" stroke="#2A2A2A" stroke-width="1"></rect>
  <g font-family="&#39;JetBrains Mono&#39;, ui-monospace, monospace" font-size="12" letter-spacing="2" fill="#8A8A8A">
    <text x="52" y="52">OTB://NAME_GEN --stress-test</text>
  </g>
  <circle cx="736" cy="47" r="4" fill="#FFE500"></circle>

  
  <g font-family="&#39;Chakra Petch&#39;, ui-monospace, monospace" font-weight="700" font-size="22" letter-spacing="2">
    <g opacity="0.5">
      <rect x="60" y="92" width="200" height="40" fill="none" stroke="#3A3A3A" stroke-width="1.5"></rect>
      <text x="76" y="120" fill="#6A6A6A">NEXORA</text>
      <line x1="60" y1="112" x2="260" y2="112" stroke="#FF2E88" stroke-width="2"></line>
    </g>
    <g opacity="0.5">
      <rect x="60" y="148" width="200" height="40" fill="none" stroke="#3A3A3A" stroke-width="1.5"></rect>
      <text x="76" y="176" fill="#6A6A6A">BRANDIFY</text>
      <line x1="60" y1="168" x2="260" y2="168" stroke="#FF2E88" stroke-width="2"></line>
    </g>
    <g opacity="0.5">
      <rect x="60" y="204" width="200" height="40" fill="none" stroke="#3A3A3A" stroke-width="1.5"></rect>
      <text x="76" y="232" fill="#6A6A6A">VELOCE</text>
      <line x1="60" y1="224" x2="260" y2="224" stroke="#FF2E88" stroke-width="2"></line>
    </g>

    
    <g filter="url(#g3glow)">
      <rect x="300" y="150" width="300" height="76" fill="none" stroke="#FFE500" stroke-width="3"></rect>
      <text x="322" y="202" fill="#FFE500">OUTTA▮</text>
    </g>
    <text x="318" y="205" fill="#24E0E0" opacity="0.55">OUTTA▮</text>
    <text x="326" y="199" fill="#FF2E88" opacity="0.45">OUTTA▮</text>
    <g stroke="#FFE500" stroke-width="2" fill="none">
      <path d="M300 150 h-14 M300 226 h-14 M600 150 h14 M600 226 h14"></path>
    </g>
    <text x="304" y="252" font-family="&#39;JetBrains Mono&#39;, ui-monospace, monospace" font-size="12" letter-spacing="2" fill="#FFE500">CLEARED // TM-OK</text>
  </g>

  
  <g font-family="&#39;JetBrains Mono&#39;, ui-monospace, monospace" font-size="12" letter-spacing="1.5">
    <text x="620" y="110" fill="#8A8A8A">LINGUISTIC</text>
    <text x="620" y="140" fill="#8A8A8A">TRADEMARK</text>
    <text x="620" y="170" fill="#8A8A8A">DOMAIN</text>
    <g fill="#FFE500"><rect x="732" y="100" width="10" height="10"></rect><rect x="732" y="130" width="10" height="10"></rect><rect x="732" y="160" width="10" height="10"></rect></g>
  </g>

  
  <g font-family="&#39;JetBrains Mono&#39;, ui-monospace, monospace" font-size="13" letter-spacing="2" fill="#FFE500">
    <text x="60" y="300">&gt; select --final</text>
    <rect x="212" y="288" width="9" height="15" fill="#FFE500"></rect>
  </g>

  <rect width="800" height="420" fill="url(#g3scan)"></rect>
  <rect x="1" y="1" width="798" height="418" fill="none" stroke="#2A2A2A" stroke-width="1"></rect>
</svg>